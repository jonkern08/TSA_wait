name: Collect JFK Wait Times

on:
  schedule:
    # Every 15 minutes, all day. The API endpoint skips collection
    # during midnight–5am ET if it's not on a :00 or :30 mark.
    - cron: "*/15 * * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger collect endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/collect" \
            -H "x-collect-token: ${{ secrets.COLLECT_SECRET }}"
